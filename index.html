<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTE プロフィールカードジェネレーター</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        
        /* CSS変数でテーマカラーを管理 */
        :root {
            --theme-color: #ff66cc;
        }

        body {
            background-color: #0d0f12; color: #e2e8f0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            margin: 0; padding: 20px 10px; display: flex; flex-direction: column; align-items: center;
        }
        .container { max-width: 600px; width: 100%; display: flex; flex-direction: column; gap: 20px; }
        .form-side, .preview-side {
            background: rgba(22, 25, 32, 0.9); padding: 20px; border-radius: 12px; border: 1px solid #2a2f3d; width: 100%;
        }
        h2 {
            margin-top: 0; color: var(--theme-color); text-transform: uppercase; letter-spacing: 2px; font-size: 1.1rem;
            border-bottom: 2px solid var(--theme-color); padding-bottom: 8px; margin-bottom: 15px;
            transition: color 0.2s, border-color 0.2s;
        }
        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-size: 0.8rem; color: #cbd5e1; }
        input, textarea, select {
            width: 100%; padding: 10px; background: #222733; border: 1px solid #3b4252;
            border-radius: 6px; color: white; font-size: 0.95rem;
        }
        input:focus, textarea:focus, select:focus { 
            outline: none; 
            border-color: var(--theme-color); 
            box-shadow: 0 0 5px var(--theme-color); 
        }
        select option { background: #161920; color: white; }
        
        /* カラーピッカー専用のスタイル調整 */
        input[type="color"] {
            padding: 2px; height: 40px; cursor: pointer; background: #222733;
        }
        
        .save-btn {
            display: block; width: 100%; padding: 14px; 
            background: var(--theme-color);
            color: #ffffff; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold;
            cursor: pointer; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.6);
            transition: background 0.2s;
        }
        .save-btn:active { opacity: 0.8; }
        
        .card-container {
            width: 100%; overflow: hidden; display: flex; justify-content: center; align-items: flex-start;
            background: #090b0e; border-radius: 8px; padding: 10px;
        }
        
        /* カード全体のレイアウト（画像通りの完璧な配置） */
        .card {
            width: 800px; height: 450px; 
            background-image: url('19e93e6dae796-screenshotUrl.jpg');
            background-size: cover; background-position: center;
            border: 4px solid var(--theme-color); border-radius: 16px; padding: 30px;
            position: relative; display: flex; flex-direction: column; flex-shrink: 0;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            justify-content: start;
            transition: border-color 0.2s;
        }
        
        /* 読みやすさを確保する半透明オーバーレイ */
        .card::before {
            content: '';
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(13, 15, 18, 0.6);
            z-index: 1;
        }
        
        .card-header, .card-grid, .card-footer, .card-item-full {
            position: relative; z-index: 2;
        }

        /* 最上段：IDとUIDを中央揃え */
        .card-header { 
            display: flex; flex-direction: column; align-items: center; 
            padding-bottom: 10px; margin-bottom: 15px; text-align: center;
        }
        .card-item-label { font-size: 0.8rem; color: #cbd5e1; text-transform: uppercase; letter-spacing: 1px; }
        .card-title { font-size: 2.6rem; font-weight: bold; color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.4); margin: 0; }
        
        /* UIDボックス（枠線と背景をテーマカラーに連動。背景はJSで透明度30%を付与） */
        .card-uid { 
            font-size: 1.1rem; color: #ffffff; font-family: monospace; 
            background: rgba(255, 102, 204, 0.3); 
            padding: 5px 12px; border-radius: 4px; 
            border: 1px solid var(--theme-color); 
            margin-top: 8px; margin-bottom: 0;
            transition: border-color 0.2s, background-color 0.2s;
        }
        
        /* 2段目：左右に分かれた情報（HUNTER LV と MAIN ESPER） */
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 0; }
        
        /* 情報パネル：左側の縦線をテーマカラーに連動 */
        .card-item { 
            background: rgba(0, 0, 0, 0.4); padding: 12px 18px; 
            border-left: 4px solid var(--theme-color); border-radius: 0 8px 8px 0; 
            transition: border-color 0.2s;
        }
        .card-item-value { font-size: 1.3rem; font-weight: bold; margin-top: 4px; color: #ffffff; }
        
        /* 3段目：中央スペース（背景のWELCOMEロゴを見せるためにmargin-bottomを自動調整） */
        .card-grid { margin-bottom: auto; }
        
        /* 4段目：メッセージパネル */
        .card-footer { 
            margin: 0 0 15px 0; 
            font-size: 1.05rem; color: #ffffff; background: rgba(0, 0, 0, 0.5); padding: 12px; border-radius: 8px; min-height: 70px; line-height: 1.5; border: 1px solid rgba(255,255,255,0.1); 
        }

        /* 最下段：CITY ACTIVITIES（画像通り白ラインを維持） */
        .card-item-full { background: rgba(0, 0, 0, 0.4); padding: 12px 18px; border-left: 4px solid rgba(255, 255, 255, 0.4); border-radius: 0 8px 8px 0; margin: 0; }
        .card-item-full .card-item-value { font-size: 1.1rem; font-weight: normal; }
        
        /* スマホ保存用モーダル */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; padding: 20px;
        }
        .modal-content { max-width: 100%; max-height: 70%; border: 2px solid var(--theme-color); border-radius: 8px; box-shadow: 0 0 20px rgba(255, 102, 204, 0.5); }
