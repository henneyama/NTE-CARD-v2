<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTE プロフィールカード</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* ベース設定 */
        :root { --theme-color: #ff66cc; }
        * { box-sizing: border-box; }
        body { background: #0d0f12; color: #e2e8f0; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 20px 10px; }
        .container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        
        /* 入力フォーム部分 */
        .box { background: #161920; padding: 20px; border-radius: 12px; border: 1px solid #2a2f3d; }
        h2 { color: var(--theme-color); margin-top: 0; border-bottom: 2px solid var(--theme-color); padding-bottom: 8px; font-size: 1.2rem; }
        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-size: 0.8rem; color: #cbd5e1; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 10px; background: #222733; border: 1px solid #3b4252; border-radius: 6px; color: white; font-size: 1rem; }
        input[type="color"] { padding: 2px; height: 45px; cursor: pointer; }
        .save-btn { width: 100%; padding: 15px; background: var(--theme-color); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; margin-top: 15px; cursor: pointer; }
        
        /* カードプレビューの枠 */
        .card-wrapper { width: 100%; overflow: hidden; background: #090b0e; border-radius: 8px; padding: 10px; display: flex; justify-content: center; }
        
        /* カード本体のデザイン */
        .card {
            width: 800px; height: 450px; background-color: #11141a;
            background-image: url('19e93e6dae796-screenshotUrl.jpg');
            background-size: cover; background-position: center;
            border: 4px solid var(--theme-color); border-radius: 16px; padding: 25px 30px;
            position: relative; display: flex; flex-direction: column; flex-shrink: 0;
        }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13, 15, 18, 0.6); }
        .card-content { position: relative; z-index: 2; display: flex; flex-direction: column; height: 100%; }
        
        .card-label { font-size: 0.8rem; color: #cbd5e1; text-transform: uppercase; letter-spacing: 1px; }
        
        /* レイアウト1：トップ行（3分割グリッド） */
        .card-top-row { display: grid; grid-template-columns: 240px 1fr 240px; width: 100%; align-items: start; }
        
        /* トップの左右のパネル（LV, ESPER） */
        .card-item { background: rgba(0,0,0,0.5); padding: 12px 18px; border-left: 4px solid var(--theme-color); border-radius: 0 8px 8px 0; }
        .card-val { font-size: 1.4rem; font-weight: bold; margin-top: 4px; color: white; }
        
        /* トップの中央パネル（AGENT ID） */
        .card-header { text-align: center; }
        .card-title { font-size: 2.8rem; font-weight: bold; color: white; margin: 0; text-shadow: 0 0 10px rgba(255,255,255,0.5); line-height: 1.1; }
        .card-uid { display: inline-block; font-family: monospace; background: rgba(255, 102, 204, 0.3); padding: 5px 12px; border-radius: 4px; border: 1px solid var(--theme-color); margin-top: 8px; color: white; font-size: 1.1rem; }
        
        /* レイアウト2：CITY ACTIVITIES（margin-top:autoで一番下へ押し込む） */
        .card-act { margin-top: auto; margin-bottom: 15px; background: rgba(0,0,0,0.5); padding: 12px 18px; border-left: 4px solid rgba(255,255,255,0.5); border-radius: 0 8px 8px 0; }
        .card-act-val { font-size: 1.2rem; color: white; margin-top: 4px; font-weight: normal; }
        
        /* レイアウト3：メッセージ（最下段） */
        .card-msg { background: rgba(0,0,0,0.6); padding: 15px 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); color: white; font-size: 1.1rem; line-height: 1.5; min-height: 60px; position: relative; }
        
        /* モーダル（画像保存画面） */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .modal img { max-width: 100%; max-height: 70%; border: 2px solid var(--theme-color); border-radius: 8px; }
        .modal p { color: var(--theme-color); font-weight: bold; margin-top: 15px; font-size: 1.1rem; }
        .modal button { margin-top: 15px; padding: 12px 30px; background: #2a2f3d; color: white; border: 1px solid #3b4252; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="box">
            <h2 id="t_form">カード入力</h2>
            <div class="input-group">
                <label id="t_lang">言語 / Language</label>
                <select id="langSelect" onchange="updateAll()">
                    <option value="ja">日本語</option>
                    <option value="en">English</option>
                    <option value="zh">简体中文</option>
                </select>
            </div>
            <div class="input-group">
                <label id="t_color">テーマカラー（枠線・アクセント色）</label>
                <input type="color" id="inColor" value="#ff66cc" oninput="updateAll()">
            </div>
            <div class="input-group"><label id="t_name">プレイヤー名 / エージェントID</label><input type="text" id="inName" value="WoWoW" oninput="updateAll()"></div>
            <div class="input-group"><label id="t_uid">UID</label><input type="text" id="inUid" value="214284359149" oninput="updateAll()"></div>
            <div class="input-group"><label id="t_rank">ハンターレベル / 鑑定レベル</label><input type="text" id="inRank" value="Lv.52 / 6" oninput="updateAll()"></div>
            <div class="input-group"><label id="t_char">推しキャラ / メインアライ</label><input type="text" id="inChar" value="ナナリ" oninput="updateAll()"></div>
            <div class="input-group"><label id="t_msg">エージェント・メッセージ (改行可)</label><textarea id="inMsg" rows="3" oninput="updateAll()">お気軽にフレンド申請どうぞ！一緒にドライブしましょう。</textarea></div>
            <div class="input-group"><label id="t_style">活動指針 (Play Style)</label><input type="text" id="inStyle" value="環状線タイムアタック" oninput="updateAll()"></div>
            <button class="save-btn" id="btnSave" onclick="saveImage()">カード画像を生成する</button>
        </div>
        
        <div class="box">
            <h2 id="t_prev">カードプレビュー</h2>
            <div class="card-wrapper" id="cardWrapper">
                <div class="card" id="cardPreview">
                    <div class="card-content">
                        <div class="card-top-row">
                            <div class="card-item">
                                <div class="card-label">HUNTER LV / APPRAISAL</div>
                                <div class="card-val" id="outRank">Lv.52 / 6</div>
                            </div>
                            <div class="card-header">
                                <div class="card-label">AGENT ID</div>
                                <div class="card-title" id="outName">WoWoW</div>
                                <div class="card-uid" id="outUidBox">UID: <span id="outUid">214284359149</span></div>
                            </div>
                            <div class="card-item">
                                <div class="card-label">MAIN ALLY</div>
                                <div class="card-val" id="outChar">ナナリ</div>
                            </div>
                        </div>
                        
                        <div class="card-act">
                            <div class="card-label">CITY ACTIVITIES</div>
                            <div class="card-act-val" id="outStyle">環状線タイムアタック</div>
                        </div>
                        
                        <div class="card-msg" id="outMsg">お気軽にフレンド申請どうぞ！<br>一緒にドライブしましょう。</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal" id="modal">
        <img id="modalImg" src="">
        <p id="t_hint">▲ 画像を長押しして保存してください ▲</p>
        <button onclick="document.getElementById('modal').style.display='none'" id="t_close">閉じて直す</button>
    </div>

    <script>
        const dict = {
            ja: { form:"カード入力", lang:"言語 / Language", color:"テーマカラー（枠線・アクセント色）", name:"プレイヤー名 / エージェントID", uid:"UID", rank:"ハンターレベル / 鑑定レベル", char:"推しキャラ / メインアライ", msg:"エージェント・メッセージ (改行可)", style:"活動指針 (Play Style)", save:"カード画像を生成する", prev:"カードプレビュー", hint:"▲ 画像を長押しして保存してください ▲", close:"閉じて直す" },
            en: { form:"Card Input", lang:"Language", color:"Theme Color (Border & Accent)", name:"Player Name / Agent ID", uid:"UID", rank:"Hunter Level / Appraisal Lv", char:"Favorite Esper / Main Ally", msg:"Agent Message (Line breaks allowed)", style:"Play Style / City Activities", save:"Generate Card Image", prev:"Card Preview", hint:"▲ Long press image to save ▲", close:"Close and Edit" },
            zh: { form:"名片输入", lang:"语言", color:"主题颜色 (边框和点缀)", name:"玩家名称 / 鉴定师ID", uid:"UID", rank:"猎人等级 / 鉴别等级", char:"推荐角色 / 常用伙伴", msg:"鉴定师留言 (可换行)", style:"活动方针 (Play Style)", save:"生成名片图片", prev:"名片预览", hint:"▲ 长按图片保存至相册 ▲", close:"关闭并修改" }
        };

        function updateAll() {
            // テキストの反映
            document.getElementById('outName').innerText = document.getElementById('inName').value || ' ';
            document.getElementById('outUid').innerText = document.getElementById('inUid').value || ' ';
            document.getElementById('outRank').innerText = document.getElementById('inRank').value || ' ';
            document.getElementById('outChar').innerText = document.getElementById('inChar').value || ' ';
            document.getElementById('outStyle').innerText = document.getElementById('inStyle').value || ' ';
            document.getElementById('outMsg').innerHTML = document.getElementById('inMsg').value.replace(/\n/g, '<br>') || ' ';
            
            // カラーの反映
            const c = document.getElementById('inColor').value;
            document.documentElement.style.setProperty('--theme-color', c);
            try {
                let r = parseInt(c.slice(1,3), 16), g = parseInt(c.slice(3,5), 16), b = parseInt(c.slice(5,7), 16);
                document.getElementById('outUidBox').style.backgroundColor = `rgba(${r},${g},${b},0.3)`;
            } catch(e) {}

            // 言語の反映
            const l = document.getElementById('langSelect').value;
            const keys = ['form','lang','color','name','uid','rank','char','msg','style','save','prev','hint','close'];
            keys.forEach(k => {
                const el = document.getElementById('t_'+k) || document.getElementById('btnSave');
                if(el) el.innerText = dict[l][k];
            });
            
            scalePreview();
        }

        function scalePreview() {
            const wrapper = document.getElementById('cardWrapper');
            const preview = document.getElementById('cardPreview');
            if(!wrapper || !preview) return;
            
            const w = wrapper.clientWidth;
            if(w < 800) {
                const s = w / 800;
                preview.style.transform = `scale(${s})`;
                preview.style.transformOrigin = 'top left';
                wrapper.style.height = `${450 * s + 20}px`;
            } else {
                preview.style.transform = 'none';
                wrapper.style.height = 'auto';
            }
        }

        function saveImage() {
            const p = document.getElementById('cardPreview');
            const btn = document.getElementById('btnSave');
            btn.disabled = true; btn.innerText = "生成中...";
            
            const origT = p.style.transform; const origO = p.style.transformOrigin;
            p.style.transform = 'none'; p.style.transformOrigin = 'initial';
            
            html2canvas(p, { scale: 2, backgroundColor: null, useCORS: true }).then(canvas => {
                p.style.transform = origT; p.style.transformOrigin = origO;
                document.getElementById('modalImg').src = canvas.toDataURL("image/png");
                document.getElementById('modal').style.display = 'flex';
                btn.disabled = false; updateAll();
            }).catch(e => {
                p.style.transform = origT; p.style.transformOrigin = origO;
                alert("画像の生成に失敗しました。"); 
                btn.disabled = false; updateAll();
            });
        }

        window.onload = updateAll;
        window.onresize = scalePreview;
    </script>
</body>
</html>
